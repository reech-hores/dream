<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로그라이크 맵 V4</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#111;
    color:white;
    font-family:sans-serif;
}

header{
    background:#1b1b1b;
    padding:15px;
    border-bottom:1px solid #333;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#content{
    padding:15px;
}

.panel{
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:10px;
    padding:12px;
    margin-bottom:15px;
}

#mapPanel{
    display:none;
}

#mapWrapper{
    overflow:auto;
    background:#151515;
    border:1px solid #333;
    border-radius:10px;
    padding:10px;
}

#map{
    position:relative;
    width:1400px;
    height:1100px;
    margin:auto;
}

#lines{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.line{
    stroke:#444;
    stroke-width:3;
}

.line.active{
    stroke:#66ff66;
    stroke-width:4;
}

.node{
    position:absolute;

    width:58px;
    height:58px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    transform:translate(-50%,-50%);

    background:#222;

    border:2px solid #444;

    font-size:26px;
}

.node.current{
    background:#1ba34d;
    border-color:#9fff9f;
    box-shadow:0 0 20px #66ff66;
}

.node.available{
    border-color:#58a6ff;
    box-shadow:0 0 15px #58a6ff;
    cursor:pointer;
}

.node.visited{
    background:#555;
}

.roomName{
    position:absolute;

    top:62px;
    left:50%;

    transform:translateX(-50%);

    width:120px;

    text-align:center;
    font-size:12px;

    color:#ccc;
}

.choice{
    display:block;
    width:100%;

    text-align:left;

    margin-top:8px;

    background:#222;
    color:white;
}

.choice:hover{
    background:#333;
}

.preview{
    margin-top:5px;
    font-size:12px;
    opacity:.7;
}

</style>
</head>
<body>

<header>

<h1>🗺 로그라이크 맵 V4</h1>

<button onclick="newGame()">
🎲 새 게임
</button>

<button onclick="toggleMap()">
🗺 전체 맵
</button>

</header>

<div id="content">

<div id="status"></div>

<div id="choices"></div>

<div id="history"></div>

<div id="mapPanel" class="panel">

<h2>전체 맵</h2>

<div id="mapWrapper">

<div id="map">

<svg id="lines"></svg>

</div>

</div>

</div>

</div>

<script>

const ROOMS = {

start:{
    icon:"🚩",
    name:"시작"
},

battle:{
    icon:"⚔",
    name:"전투"
},

event:{
    icon:"❓",
    name:"이벤트"
},

elite:{
    icon:"💀",
    name:"엘리트"
},

shop:{
    icon:"🏪",
    name:"상점"
},

goblin:{
    icon:"🪙",
    name:"황금고블린"
},

brawl:{
    icon:"🔥",
    name:"난투전"
},

survive:{
    icon:"🛡",
    name:"버티기"
},

rest:{
    icon:"⛺",
    name:"정비상점"
},

boss:{
    icon:"👑",
    name:"보스"
}

};

let nodeId = 1;

function createNode(type,floor){

    return{

        id:nodeId++,

        type:type,

        floor:floor,

        x:0,
        y:0,

        next:[],

        visited:false

    };

}

function pick(arr){

    return arr[
        Math.floor(
            Math.random()*arr.length
        )
    ];

}

const game={

    stageIndex:0,

    stages:[],

    currentNode:null,

    history:[],

    showMap:false

};

function roomText(node){

    return(
        ROOMS[node.type].icon+
        " "+
        ROOMS[node.type].name
    );

}

const FLOOR_LAYOUT = [

1, // 시작

3,
5,
6,
7,
6,
5,
3,

1, // 정비상점

1  // 보스

];
function buildStages(){

    game.stages=[];

    for(let i=0;i<3;i++){

        game.stages.push(
            createStage()
        );

    }

}

function createStage(){

    const floors=[];

    const limits={

        elite:0,
        shop:0,
        goblin:0,
        brawl:0,
        survive:0

    };

    floors.push([
        createNode("start",0)
    ]);

    let battleTurn=true;

    for(
        let floor=1;
        floor<=7;
        floor++
    ){

        const row=[];

        const count=
        FLOOR_LAYOUT[floor];

        for(
            let i=0;
            i<count;
            i++
        ){

            let type;

            if(floor===1){

                type=
                battleTurn
                ? "battle"
                : "event";

                battleTurn=
                !battleTurn;

            }
            else{

                type=
                chooseRoom(
                    limits,
                    battleTurn
                );

                if(
                    type==="battle" ||
                    type==="event"
                ){
                    battleTurn=
                    !battleTurn;
                }

            }

            row.push(
                createNode(
                    type,
                    floor
                )
            );

        }

        floors.push(row);

    }

    floors.push([
        createNode(
            "rest",
            8
        )
    ]);

    floors.push([
        createNode(
            "boss",
            9
        )
    ]);

    connectFloors(
        floors
    );

    ensureIncomingConnections(
        floors
    );

    calculatePositions(
        floors
    );

    return{

        floors,

        startNode:
        floors[0][0]

    };

}

function chooseRoom(
    limits,
    battleTurn
){

    const roll=
    Math.random();

    if(
        roll<0.05 &&
        limits.elite<4
    ){
        limits.elite++;
        return "elite";
    }

    if(
        roll<0.09 &&
        limits.shop<2
    ){
        limits.shop++;
        return "shop";
    }

    if(
        roll<0.13 &&
        limits.goblin<2
    ){
        limits.goblin++;
        return "goblin";
    }

    if(
        roll<0.17 &&
        limits.brawl<2
    ){
        limits.brawl++;
        return "brawl";
    }

    if(
        roll<0.21 &&
        limits.survive<2
    ){
        limits.survive++;
        return "survive";
    }

    return battleTurn
        ? "battle"
        : "event";

}

function connectFloors(
    floors
){

    const start=
    floors[0][0];

    start.next=[
        floors[1][0],
        floors[1][1],
        floors[1][2]
    ];

    for(
        let floor=1;
        floor<7;
        floor++
    ){

        const current=
        floors[floor];

        const next=
        floors[floor+1];

        current.forEach(
            (
                node,
                index
            )=>{

                const ratio=
                index/
                (
                    current.length-1 || 1
                );

                const center=
                Math.round(
                    ratio*
                    (
                        next.length-1
                    )
                );

                const candidates=[];

                for(
                    let i=center-1;
                    i<=center+1;
                    i++
                ){

                    if(
                        i>=0 &&
                        i<next.length
                    ){

                        candidates.push(
                            next[i]
                        );

                    }

                }

                const roll=
                Math.random();

                let links;

                if(
                    roll<0.40
                ){

                    links=1;

                }
                else if(
                    roll<0.90
                ){

                    links=2;

                }
                else{

                    links=3;

                }

                while(
                    node.next.length<
                    links &&
                    candidates.length
                ){

                    const target=
                    pick(
                        candidates
                    );

                    node.next.push(
                        target
                    );

                    candidates.splice(
                        candidates.indexOf(
                            target
                        ),
                        1
                    );

                }

            }
        );

    }

    const lastFloor=
    floors[7];

    const rest=
    floors[8][0];

    lastFloor.forEach(
        node=>{

            node.next=[rest];

        }
    );

    rest.next=[
        floors[9][0]
    ];

}

function ensureIncomingConnections(
    floors
){

    for(
        let floor=1;
        floor<=7;
        floor++
    ){

        const current=
        floors[floor];

        current.forEach(
            node=>{

                let incoming=false;

                const prev=
                floors[floor-1];

                prev.forEach(
                    parent=>{

                        if(
                            parent.next.includes(
                                node
                            )
                        ){
                            incoming=true;
                        }

                    }
                );

                if(
                    incoming
                ){
                    return;
                }

                const parent=
                prev[
                    Math.floor(
                        Math.random()*
                        prev.length
                    )
                ];

                parent.next.push(
                    node
                );

            }
        );

    }

}
function calculatePositions(floors){

    const width=1300;
    const height=950;

    floors.forEach(
        (row,rowIndex)=>{

            const y=
            70+
            (
                rowIndex*
                (
                    height/
                    (floors.length-1)
                )
            );

            const spacing=
            width/
            (row.length+1);

            row.forEach(
                (node,index)=>{

                    node.x=
                    spacing*
                    (index+1);

                    node.y=y;

                }
            );

        }
    );

}

function render(){

    renderStatus();
    renderChoices();
    renderHistory();

    if(game.showMap){
        renderMap();
    }

}

function renderStatus(){

    document
    .getElementById("status")
    .innerHTML=

    `
    <div class="panel">

        <h2>현재 위치</h2>

        <div style="
            margin-top:10px;
            font-size:24px;
        ">
            ${roomText(game.currentNode)}
        </div>

        <div style="
            margin-top:10px;
            color:#66ff66;
        ">
            스테이지
            ${game.stageIndex+1}
            / 3
        </div>

    </div>
    `;

}

function renderChoices(){

    let html=

    `
    <div class="panel">

        <h2>이동 가능한 구역</h2>
    `;

    game.currentNode.next
    .forEach(node=>{

        const preview=
        node.next.length
        ?
        node.next
        .map(
            n=>
            ROOMS[n.type].icon
        )
        .join(" ")
        :
        "보스";

        html+=

        `
        <button
            class="choice"
            onclick="moveTo(${node.id})"
        >

            <div>
                ${roomText(node)}
            </div>

            <div class="preview">
                다음:
                ${preview}
            </div>

        </button>
        `;

    });

    html+=
    "</div>";

    document
    .getElementById("choices")
    .innerHTML=
    html;

}

function renderHistory(){

    let html=

    `
    <div class="panel">

        <h2>이동 기록</h2>
    `;

    game.history
    .forEach(item=>{

        html+=
        `<div>✔ ${item}</div>`;

    });

    html+=
    "</div>";

    document
    .getElementById("history")
    .innerHTML=
    html;

}

function moveTo(id){

    const next=
    game.currentNode.next
    .find(
        n=>n.id===id
    );

    if(!next){
        return;
    }

    game.currentNode.visited=true;

    game.currentNode=
    next;

    game.history.push(
        roomText(next)
    );

    if(
        next.type==="boss"
    ){

        if(
            game.stageIndex<2
        ){

            alert(
                `스테이지 ${
                    game.stageIndex+1
                } 클리어!`
            );

            game.stageIndex++;

            game.currentNode=
            game.stages[
                game.stageIndex
            ].startNode;

            game.history.push(
                `➡ 스테이지 ${
                    game.stageIndex+1
                }`
            );

        }
        else{

            renderVictory();
            return;

        }

    }

    render();

}

function renderMap(){

    const stage=
    game.stages[
        game.stageIndex
    ];

    const map=
    document.getElementById(
        "map"
    );

    const svg=
    document.getElementById(
        "lines"
    );

    map
    .querySelectorAll(".node")
    .forEach(
        n=>n.remove()
    );

    svg.innerHTML="";

    stage.floors.forEach(
        row=>{

            row.forEach(
                node=>{

                    node.next.forEach(
                        target=>{

                            const line=
                            document.createElementNS(
                                "http://www.w3.org/2000/svg",
                                "line"
                            );

                            line.setAttribute(
                                "x1",
                                node.x
                            );

                            line.setAttribute(
                                "y1",
                                node.y
                            );

                            line.setAttribute(
                                "x2",
                                target.x
                            );

                            line.setAttribute(
                                "y2",
                                target.y
                            );

                            let cls="line";

                            if(
                                node.visited
                            ){
                                cls+=" active";
                            }

                            line.setAttribute(
                                "class",
                                cls
                            );

                            svg.appendChild(
                                line
                            );

                        }
                    );

                }
            );

        }
    );

    stage.floors.forEach(
        row=>{

            row.forEach(
                node=>{

                    const div=
                    document.createElement("div");

                    let cls="node";

                    if(
                        node.id===
                        game.currentNode.id
                    ){

                        cls+=" current";

                    }
                    else if(
                        node.visited
                    ){

                        cls+=" visited";

                    }
                    else if(
                        game.currentNode.next
                        .includes(node)
                    ){

                        cls+=" available";

                    }

                    div.className=
                    cls;

                    div.style.left=
                    node.x+"px";

                    div.style.top=
                    node.y+"px";

                    div.innerHTML=

                    `
                    ${ROOMS[node.type].icon}

                    <div class="roomName">
                        ${ROOMS[node.type].name}
                    </div>
                    `;

                    if(
                        game.currentNode.next
                        .includes(node)
                    ){

                        div.onclick=
                        ()=>moveTo(
                            node.id
                        );

                    }

                    map.appendChild(
                        div
                    );

                }
            );

        }
    );

}

function renderVictory(){

    document
    .getElementById("content")
    .innerHTML=

    `
    <div class="panel">

        <h1>
            🎉 게임 클리어
        </h1>

        <p>
            모든 스테이지를
            돌파했습니다.
        </p>

        <button
            onclick="location.reload()"
        >
            새 게임
        </button>

    </div>
    `;

}

function toggleMap(){

    game.showMap=
    !game.showMap;

    document
    .getElementById(
        "mapPanel"
    ).style.display=

    game.showMap
    ? "block"
    : "none";

    if(
        game.showMap
    ){
        renderMap();
    }

}

function newGame(){

    nodeId=1;

    game.history=[];

    game.stageIndex=0;

    buildStages();

    game.currentNode=
    game.stages[0]
    .startNode;

    game.history.push(
        "🚩 시작"
    );

    render();

}

newGame();

</script>
</body>
</html>
